# nginx.conf - Reverse proxy for GCJ Official Website
# - Serves React SPA on / (via frontend container)
# - Proxies /api/ and /admin/ to Django
# - Adds security headers
# - Adds rate limiting for API endpoints
# - Sets reasonable timeouts and buffering

user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
access_log /var/log/nginx/access.log main;

events {
  worker_connections 4096;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  60;
  types_hash_max_size 2048;

  # Gzip
  gzip on;
  gzip_disable "msie6";
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Rate limiting: 10 requests/sec per IP with burst
  limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=10r/s;

  # Upstreams
  upstream django_backend {
    server backend:8000;
    keepalive 64;
  }

  upstream frontend_app {
    server frontend:80;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Common proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering off;

    # Serve React SPA at /
    location / {
      proxy_pass http://frontend_app;
      proxy_http_version 1.1;
    }

    # Django admin
    location /admin/ {
      proxy_pass http://django_backend;
      proxy_http_version 1.1;
    }

    # Django API
    location /api/ {
      limit_req zone=api_ratelimit burst=30 nodelay;
      proxy_pass http://django_backend;
      proxy_http_version 1.1;
    }

    # Optional: if backend serves static files directly (not used when using collectstatic)
    # location /static/ {
    #   proxy_pass http://django_backend;
    # }
  }
}

